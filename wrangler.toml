name = "meilleur-ats"
main = ".open-next/worker.js"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# Serve static assets (pre-rendered HTML, _next/static, public/) from the edge
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Observability (logs visible in Cloudflare dashboard in production)
[observability]
enabled = true
